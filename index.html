<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Block</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #070a07;
      --green:     #5cb83f;
      --green-dim: #3a7d2e;
      --green-glow:#7deb58;
      --white:     #e8f0e8;
      --dim:       rgba(232,240,232,0.45);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      cursor: crosshair;
      color: var(--white);
    }

    /* ── Deep layered background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 110%, rgba(40,90,20,0.45) 0%, transparent 65%),
        radial-gradient(ellipse 100% 40% at 50% 0%,   rgba(4,10,4,0.95)  0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 50% 50%,   rgba(15,30,10,0.3) 0%, transparent 70%);
    }

    /* Scanline texture */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
    }

    /* Bottom fog */
    .fog {
      position: fixed; bottom: 0; left: 0; right: 0; height: 30%;
      background: linear-gradient(to top, rgba(5,12,5,0.95) 0%, transparent 100%);
      z-index: 2; pointer-events: none;
    }

    /* Vignette */
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 40%, rgba(0,0,0,0.75) 100%);
    }

    /* Hit flash */
    #flash {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      opacity: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(100,220,60,0.12) 0%, transparent 70%);
      transition: opacity 0.05s;
    }
    #flash.on { opacity: 1; }

    /* ── Main layout ── */
    .scene {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* Counter */
    .counter-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-bottom: 52px;
    }
    .counter-label {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--dim);
      text-transform: uppercase;
    }
    .counter-value {
      font-size: 40px;
      color: var(--green);
      text-shadow:
        0 0 20px rgba(92,184,63,0.8),
        0 0 50px rgba(92,184,63,0.4),
        0 0 90px rgba(92,184,63,0.2);
      line-height: 1;
      transition: transform 0.08s;
    }
    .counter-value.bump { transform: scale(1.15); }

    /* Block */
    .block-wrap {
      position: relative;
      width: 300px;
      height: 300px;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      animation: float 3.5s ease-in-out infinite;
      filter:
        drop-shadow(0 40px 60px rgba(0,0,0,0.95))
        drop-shadow(0 0 50px rgba(58,125,46,0.35));
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-18px); }
    }

    .block-wrap:hover {
      filter:
        drop-shadow(0 40px 60px rgba(0,0,0,0.95))
        drop-shadow(0 0 80px rgba(92,184,63,0.7))
        brightness(1.1);
    }

    .block-wrap.hit {
      animation: hit-anim 0.18s ease-out forwards !important;
      filter:
        drop-shadow(0 20px 40px rgba(0,0,0,0.95))
        drop-shadow(0 0 100px rgba(125,235,88,0.95))
        brightness(1.3) !important;
    }

    @keyframes hit-anim {
      0%   { transform: scale(1) translateY(0); }
      25%  { transform: scale(0.92) translateY(8px); }
      65%  { transform: scale(1.05) translateY(-5px); }
      100% { transform: scale(1) translateY(0); }
    }

    .block-img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: pixelated;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* Hint text */
    .hint {
      margin-top: 48px;
      font-size: 8px;
      letter-spacing: 5px;
      color: var(--dim);
      text-transform: uppercase;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.45; }
      50%      { opacity: 0.9; }
    }

    /* Particles */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 20; overflow: hidden; }
    .particle {
      position: absolute;
      image-rendering: pixelated;
      border-radius: 1px;
      animation: pfx var(--dur) ease-out forwards;
    }
    @keyframes pfx {
      0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx),var(--ty)) rotate(var(--tr)) scale(0.2); }
    }

    /* Damage number */
    .dmg {
      position: fixed; pointer-events: none; z-index: 30;
      font-size: 12px; color: #fff;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000;
      animation: dmg-rise 0.75s ease-out forwards;
    }
    @keyframes dmg-rise {
      0%   { opacity: 1; transform: translateY(0) scale(1.2); }
      100% { opacity: 0; transform: translateY(-55px) scale(0.7); }
    }

    /* ── Admin ── */
    .admin-trigger {
      position: fixed; bottom: 14px; right: 18px;
      font-size: 8px; color: rgba(255,255,255,0.06);
      cursor: pointer; z-index: 50; user-select: none;
      transition: color 0.4s; letter-spacing: 1px;
    }
    .admin-trigger:hover { color: rgba(255,255,255,0.22); }

    .admin-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .admin-overlay.open { display: flex; }

    .admin-box {
      background: #0b160b;
      border: 1px solid #253d18;
      width: min(720px, 95vw);
      max-height: 88vh;
      overflow-y: auto;
      padding: 36px;
      box-shadow: 0 0 100px rgba(58,125,46,0.25);
    }

    .admin-title {
      font-size: 10px; letter-spacing: 3px;
      color: var(--green);
      text-shadow: 0 0 15px rgba(92,184,63,0.5);
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid #1a3010;
    }

    .pw-wrap { display: flex; flex-direction: column; gap: 14px; }
    .pw-label { font-size: 8px; letter-spacing: 2px; color: var(--dim); }
    .pw-input {
      background: #080f08; border: 1px solid #253d18;
      color: var(--white); padding: 12px 16px;
      font-family: 'Press Start 2P', monospace; font-size: 10px;
      outline: none; width: 260px; letter-spacing: 2px;
    }
    .pw-input:focus { border-color: var(--green-dim); }
    .pw-btn {
      background: transparent; border: 1px solid var(--green-dim);
      color: var(--green); font-family: 'Press Start 2P', monospace;
      font-size: 8px; padding: 12px 22px; cursor: pointer;
      letter-spacing: 2px; transition: all 0.2s; width: fit-content;
    }
    .pw-btn:hover { background: rgba(58,125,46,0.15); border-color: var(--green); }
    .pw-err { font-size: 7px; color: #e05555; letter-spacing: 1px; display: none; }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #080f08; border: 1px solid #1a3010;
      padding: 20px; text-align: center;
    }
    .stat-card .slabel {
      font-size: 7px; letter-spacing: 2px;
      color: var(--dim); margin-bottom: 10px;
    }
    .stat-card .svalue {
      font-size: 28px; color: var(--green);
      text-shadow: 0 0 20px rgba(92,184,63,0.5);
    }

    .log-title {
      font-size: 8px; letter-spacing: 2px; color: var(--dim);
      margin-bottom: 14px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 7px; }
    th {
      color: rgba(255,255,255,0.3); text-align: left;
      padding: 8px; border-bottom: 1px solid #1a3010;
      letter-spacing: 1px; font-size: 6px;
    }
    td {
      padding: 8px; border-bottom: 1px solid #0d1a0d;
      color: rgba(255,255,255,0.65); line-height: 1.6;
    }
    tr.new-visitor td { color: var(--green); }
    td.muted { color: rgba(255,255,255,0.3); }

    .close-btn {
      margin-top: 24px; background: transparent;
      border: 1px solid #253d18; color: var(--dim);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; padding: 10px 20px; cursor: pointer;
      letter-spacing: 2px; transition: all 0.2s;
    }
    .close-btn:hover { border-color: var(--green-dim); color: var(--green); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #0b160b; }
    ::-webkit-scrollbar-thumb { background: #253d18; }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="fog"></div>
<div class="vignette"></div>
<div id="flash"></div>
<div id="particles"></div>

<div class="scene">
  <div class="counter-wrap">
    <div class="counter-label">times mined</div>
    <div class="counter-value" id="countVal">0</div>
  </div>

  <div class="block-wrap" id="block" onclick="handleClick(event)">
    <img class="block-img" src="grass.jpg" alt="Minecraft grass block" draggable="false" />
  </div>

  <div class="hint">click to mine</div>
</div>

<div class="admin-trigger" onclick="openAdmin()">■</div>

<div class="admin-overlay" id="adminOverlay">
  <div class="admin-box">
    <div class="admin-title">◆ METRICS</div>

    <div id="pwGate">
      <div class="pw-wrap">
        <div class="pw-label">PASSWORD</div>
        <input class="pw-input" type="password" id="pwInput" placeholder="········"
               onkeydown="if(event.key==='Enter') checkPw()" />
        <button class="pw-btn" onclick="checkPw()">ENTER</button>
        <div class="pw-err" id="pwErr">✕ incorrect password</div>
      </div>
    </div>

    <div id="statsView" style="display:none">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="slabel">TOTAL CLICKS</div>
          <div class="svalue" id="aTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="slabel">UNIQUE VISITORS</div>
          <div class="svalue" id="aUnique">—</div>
        </div>
      </div>
      <div class="log-title">VISIT LOG</div>
      <table>
        <thead>
          <tr>
            <th>#</th><th>DATE</th><th>TIME</th><th>LOCATION</th><th>STATUS</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>

    <button class="close-btn" onclick="closeAdmin()">CLOSE</button>
  </div>
</div>

<script>
  // ← Replace with your actual Worker URL after deploying
  const WORKER_URL = "https://grass-api.YOUR-SUBDOMAIN.workers.dev";

  const COLORS = ["#5BA535","#4a8c2a","#8B5E3C","#6B4226","#2d6b18","#a0723a","#3d7a1e"];

  let count = 0;
  let hitTimer = null;
  const block     = document.getElementById("block");
  const countVal  = document.getElementById("countVal");
  const flash     = document.getElementById("flash");
  const particles = document.getElementById("particles");

  (async () => {
    try {
      const r = await fetch(`${WORKER_URL}/count`);
      const d = await r.json();
      count = d.total;
      countVal.textContent = count.toLocaleString();
    } catch(e) {}
  })();

  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 25) * 0.8;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const lp = ctx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.value = 700 + Math.random() * 500;
      lp.Q.value = 2;
      src.connect(lp);
      lp.connect(ctx.destination);
      src.start(0);
      src.stop(ctx.currentTime + 0.2);
      setTimeout(() => ctx.close(), 400);
    } catch(e) {}
  }

  function spawnParticles(x, y) {
    for (let i = 0; i < 12 + Math.floor(Math.random()*6); i++) {
      const p = document.createElement("div");
      p.className = "particle";
      const sz = 5 + Math.random() * 9;
      p.style.cssText = `
        left:${x - sz/2}px; top:${y - sz/2}px;
        width:${sz}px; height:${sz}px;
        background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
        --tx:${(Math.random()-0.5)*170}px;
        --ty:${-50 - Math.random()*110}px;
        --tr:${(Math.random()-0.5)*420}deg;
        --dur:${0.5 + Math.random()*0.35}s;
      `;
      particles.appendChild(p);
      p.addEventListener("animationend", () => p.remove());
    }
  }

  function spawnDmg(x, y) {
    const el = document.createElement("div");
    el.className = "dmg";
    el.textContent = "-1";
    el.style.left = (x + 8 + (Math.random()*20-10)) + "px";
    el.style.top  = (y - 10) + "px";
    document.body.appendChild(el);
    el.addEventListener("animationend", () => el.remove());
  }

  async function handleClick(e) {
    playSound();
    spawnParticles(e.clientX, e.clientY);
    spawnDmg(e.clientX, e.clientY);

    block.classList.remove("hit");
    void block.offsetWidth;
    block.classList.add("hit");
    flash.classList.add("on");
    clearTimeout(hitTimer);
    hitTimer = setTimeout(() => {
      block.classList.remove("hit");
      flash.classList.remove("on");
    }, 220);

    count++;
    countVal.textContent = count.toLocaleString();
    countVal.classList.remove("bump");
    void countVal.offsetWidth;
    countVal.classList.add("bump");
    setTimeout(() => countVal.classList.remove("bump"), 150);

    try { await fetch(`${WORKER_URL}/click`, { method: "POST" }); } catch(e) {}
  }

  function openAdmin() {
    document.getElementById("adminOverlay").classList.add("open");
    document.getElementById("pwGate").style.display = "block";
    document.getElementById("statsView").style.display = "none";
    document.getElementById("pwInput").value = "";
    document.getElementById("pwErr").style.display = "none";
    setTimeout(() => document.getElementById("pwInput").focus(), 80);
  }
  function closeAdmin() {
    document.getElementById("adminOverlay").classList.remove("open");
  }
  document.getElementById("adminOverlay").addEventListener("click", function(e) {
    if (e.target === this) closeAdmin();
  });

  async function checkPw() {
    const pw = document.getElementById("pwInput").value;
    try {
      const r = await fetch(`${WORKER_URL}/stats?password=${encodeURIComponent(pw)}`);
      if (!r.ok) throw new Error();
      const data = await r.json();
      renderStats(data);
    } catch(e) {
      document.getElementById("pwErr").style.display = "block";
    }
  }

  function renderStats(data) {
    document.getElementById("pwGate").style.display = "none";
    document.getElementById("statsView").style.display = "block";
    document.getElementById("aTotal").textContent  = data.total.toLocaleString();
    document.getElementById("aUnique").textContent = data.unique.toLocaleString();
    const tbody = document.getElementById("logBody");
    tbody.innerHTML = "";
    data.log.forEach((row, i) => {
      const dt   = new Date(row.time);
      const date = dt.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
      const time = dt.toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
      const tr = document.createElement("tr");
      if (row.isNew) tr.classList.add("new-visitor");
      tr.innerHTML = `
        <td class="muted">${i+1}</td>
        <td>${date}</td>
        <td>${time}</td>
        <td class="muted">${row.location || "Unknown"}</td>
        <td>${row.isNew ? "★ NEW" : "—"}</td>
      `;
      tbody.appendChild(tr);
    });
  }
</script>
</body>
</html>
